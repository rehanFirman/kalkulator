<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>


        body {
    background: linear-gradient(135deg, #1e1e1e, #3a3a2f, #6f7f5f);
    min-height: 100vh;
    overflow: hidden;
}

        .container {
            width: 400px;
            background-color: #aabb90;
            height: 60vh;
            margin: 100px auto;
            display: grid;
            grid-template-columns: repeat(4, 20%);
            grid-template-rows: 13vh repeat(3, 12vh);
            gap: 10px;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
        }

        .container > div:nth-child(1) {
            background-color: #332a19;
            grid-column: 1 / 5;
            height: 80%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgb(255, 255, 255);
        }


        .container div:nth-child(12){
            grid-column: 3 / 5;
        }

        .container > div:nth-child(12) {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(3, 31%);
            gap: 5px;
        }

        .container > div:nth-child(n+2):nth-child(-n+11) {
           width: 100%;
           height: 100%;
           outline: 1px solid black;
           background-color: #973;
           display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 5%;
            transition: 0.3s ease;
            box-shadow: 0 4px 0 #333;
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-weight: 550;

        }

       .container > div:nth-child(n+2):nth-child(-n+11):active {
        transform: scale(0.80);
}

        .container .jumlah div {
            outline: 1px solid black;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bolder;
            font-family: Arial, Helvetica, sans-serif;
            background-color: aliceblue;
            border-radius: 5px;
            box-shadow: 0 4px 0 #333;
              transition: 0.3s ease;
        }

        .container .jumlah div:active {
            transform: scale(0.5);
        }

        /* responsive */
        @media (max-width: 480px) {
            .container {
                width: 100%;
                grid-template-columns: repeat(auto-fit, minmax(50px, 20%));
            }
}


      
    </style>
</head>
<body>
    <div class="container">
        <div>- -</div>
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
        <div>8</div>
        <div>9</div>
        <div>10</div>
        <div class="jumlah">
            <div>+</div>
            <div>-</div>
            <div>x</div>
            <div>:</div>
            <div>=</div>
            <div>Reset</div>
        </div>
    </div>

    <script>
    const display = document.querySelector(".container > div:nth-child(1)");
    const angka = document.querySelectorAll(".container > div:nth-child(n+2):nth-child(-n+11)");
    const operatorBtns = document.querySelectorAll(".jumlah div");

    let currentInput = "";
    let operator = "";
    let firstValue = "";

    // tombol angka
    angka.forEach(btn => {
        btn.addEventListener("click", () => {
            currentInput += btn.textContent;
            display.textContent = currentInput;
        });
    });

     operatorBtns.forEach(btn => {
        btn.addEventListener("click", () => {
            let value = btn.textContent;

            if (value === "Reset") {
                currentInput = "";
                operator = "";
                firstValue = "";
                display.textContent = "- -";
                return;
            }

        if (value === "=") {
                if (firstValue && operator && currentInput) {
                    let result = hitung(firstValue, operator, currentInput);
                    display.textContent = result;
                    currentInput = result;
                    operator = "";
                    firstValue = "";
                }
                return;
            }


                     // operator + - x :
            if (["+", "-", "x", ":"].includes(value)) {
                firstValue = currentInput;
                operator = value;
                currentInput = "";
            }
        });
    });

      function hitung(a, op, b) {
        a = parseFloat(a);
        b = parseFloat(b);

        switch(op) {
            case "+": return a + b;
            case "-": return a - b;
            case "x": return a * b;
            case ":": return a / b;
            default: return 0;
        }
    }
    </script>
</body>
</html>
